<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員抽獎程式</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a12;--surface:#12121e;--surface2:#1a1a2e;--surface3:#22223a;
  --accent:#6c5ce7;--accent2:#a29bfe;--accent3:#fd79a8;
  --gold:#ffd700;--gold2:#ffaa00;
  --text:#e8e8f0;--text2:#9898b0;--text3:#6868a0;
  --border:#2a2a45;--success:#00b894;--danger:#ff6b6b;
  --radius:14px;--radius-sm:10px;
}
html{font-size:15px}
body{
  font-family:'Noto Sans TC','Outfit',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(108,92,231,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(253,121,168,0.06) 0%, transparent 60%);
}

/* ── Layout ── */
.app{max-width:900px;margin:0 auto;padding:24px 20px 60px}
.app-header{text-align:center;padding:48px 0 36px;position:relative}
.app-header h1{
  font-family:'Outfit','Noto Sans TC',sans-serif;
  font-size:2.4rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent2),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-0.5px;
}
.app-header p{color:var(--text2);margin-top:8px;font-size:.95rem}

/* ── Cards ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:28px;margin-bottom:20px;
  transition:border-color .3s;
}
.card:hover{border-color:var(--surface3)}
.card-title{
  font-size:1.05rem;font-weight:700;margin-bottom:18px;
  display:flex;align-items:center;gap:10px;
}
.card-title .step{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0;
}

/* ── Form Elements ── */
label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:6px;font-weight:500}
input,select,textarea{
  width:100%;padding:12px 16px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  font-size:.92rem;font-family:inherit;
  transition:border-color .25s,box-shadow .25s;outline:none;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(108,92,231,0.15);
}
input::placeholder{color:var(--text3)}
.row{display:flex;gap:14px;flex-wrap:wrap}
.row>*{flex:1;min-width:140px}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 24px;border:none;border-radius:var(--radius-sm);
  font-size:.92rem;font-weight:600;font-family:inherit;
  cursor:pointer;transition:all .25s;position:relative;overflow:hidden;
}
.btn:active{transform:scale(0.97)}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#8b5cf6);
  color:#fff;box-shadow:0 4px 20px rgba(108,92,231,0.3);
}
.btn-primary:hover{box-shadow:0 6px 28px rgba(108,92,231,0.45);transform:translateY(-1px)}
.btn-gold{
  background:linear-gradient(135deg,var(--gold2),var(--gold),#ffe066);
  color:#1a1a2e;box-shadow:0 4px 24px rgba(255,215,0,0.25);
}
.btn-gold:hover{box-shadow:0 6px 32px rgba(255,215,0,0.4);transform:translateY(-1px)}
.btn-outline{
  background:transparent;border:1px solid var(--border);color:var(--text2);
}
.btn-outline:hover{border-color:var(--accent);color:var(--accent2)}
.btn-sm{padding:8px 16px;font-size:.82rem}
.btn-block{width:100%}
.btn:disabled{opacity:0.45;cursor:not-allowed;transform:none!important}

/* ── Upload Area ── */
.upload-zone{
  border:2px dashed var(--border);border-radius:var(--radius);
  padding:48px 24px;text-align:center;cursor:pointer;
  transition:all .3s;position:relative;
}
.upload-zone:hover,.upload-zone.dragover{
  border-color:var(--accent);background:rgba(108,92,231,0.05);
}
.upload-zone .icon{font-size:2.8rem;margin-bottom:12px;display:block}
.upload-zone .main-text{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:6px}
.upload-zone .sub-text{font-size:.82rem;color:var(--text3)}
.upload-zone input[type="file"]{
  position:absolute;inset:0;opacity:0;cursor:pointer;
}
.upload-zone.has-file{border-color:var(--success);border-style:solid;background:rgba(0,184,148,0.05)}
.upload-zone.has-file .icon::after{content:'✅';font-size:1.6rem;margin-left:8px}

/* ── Stats Bar ── */
.stats-bar{
  display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;
}
.stat-item{
  flex:1;min-width:120px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px 16px;text-align:center;
}
.stat-item .stat-value{
  font-size:1.5rem;font-weight:800;
  font-family:'Outfit','Noto Sans TC',sans-serif;
}
.stat-item .stat-label{font-size:.78rem;color:var(--text3);margin-top:4px}
.stat-value.text-accent{color:var(--accent2)}
.stat-value.text-success{color:var(--success)}
.stat-value.text-danger{color:var(--danger)}

/* ── Members Table ── */
.members-table{width:100%;border-collapse:collapse;font-size:.88rem}
.members-table th{
  text-align:left;padding:10px 14px;
  color:var(--text3);font-weight:500;font-size:.8rem;
  border-bottom:1px solid var(--border);
  text-transform:uppercase;letter-spacing:.5px;
}
.members-table td{padding:10px 14px;border-bottom:1px solid rgba(42,42,69,0.5)}
.members-table tr:hover td{background:var(--surface2)}
.type-tag{
  display:inline-block;padding:3px 10px;border-radius:6px;
  font-size:.75rem;font-weight:600;
}
.type-tag.comp{background:rgba(108,92,231,0.15);color:var(--accent2)}
.type-tag.yearly{background:rgba(255,215,0,0.15);color:var(--gold)}
.type-tag.monthly{background:rgba(0,184,148,0.15);color:var(--success)}
.type-tag.gift{background:rgba(253,121,168,0.15);color:var(--accent3)}
.type-tag.other{background:rgba(152,152,176,0.15);color:var(--text2)}

/* ── Prize Config ── */
.prize-row{
  display:flex;gap:10px;align-items:center;margin-bottom:10px;
  animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
.prize-row input{flex:1}
.prize-row .qty{width:80px;flex:none}
.remove-prize{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--danger);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:all .2s;flex-shrink:0;
}
.remove-prize:hover{background:rgba(255,107,107,0.1);border-color:var(--danger)}

/* ── Lottery Animation Overlay ── */
.lottery-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(10,10,18,0.92);backdrop-filter:blur(12px);
  z-index:1000;display:none;align-items:center;justify-content:center;
  flex-direction:column;
}
.lottery-overlay.show{display:flex}
.slot-machine{text-align:center;perspective:600px}
.slot-name{
  font-size:2.8rem;font-weight:900;
  font-family:'Outfit','Noto Sans TC',sans-serif;
  background:linear-gradient(135deg,var(--gold),var(--gold2),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  min-height:80px;display:flex;align-items:center;justify-content:center;
  animation:none;
}
.slot-name.rolling{animation:slotRoll .08s infinite}
@keyframes slotRoll{
  0%{transform:translateY(-4px);opacity:0.6}
  50%{transform:translateY(4px);opacity:1}
  100%{transform:translateY(-4px);opacity:0.6}
}
.slot-email{
  font-size:1rem;color:var(--text2);margin-top:8px;
  min-height:28px;
}
.prize-label{
  font-size:1.1rem;color:var(--accent2);margin-bottom:16px;font-weight:600;
}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1001}

/* ── Winners Display ── */
.winners-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.winner-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:18px;
  display:flex;align-items:center;gap:14px;
  animation:winnerIn .5s ease both;
  position:relative;overflow:hidden;
}
.winner-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--accent3),var(--accent));
}
@keyframes winnerIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.winner-card .winner-avatar{
  width:50px;height:50px;border-radius:50%;
  border:2px solid var(--gold);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface3);font-size:1.2rem;font-weight:700;
  color:var(--accent2);
}
.winner-info .winner-name{font-weight:700;font-size:.95rem}
.winner-info .winner-email{font-size:.78rem;color:var(--text3);margin-top:2px}
.winner-info .winner-prize{font-size:.82rem;color:var(--gold);margin-top:3px}

/* ── Utilities ── */
.hidden{display:none!important}
.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}.mt-24{margin-top:24px}
.mb-12{margin-bottom:12px}
.text-center{text-align:center}
.text-muted{color:var(--text3);font-size:.85rem}
.divider{height:1px;background:var(--border);margin:20px 0}
.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state .icon{font-size:2.4rem;margin-bottom:12px}

/* ── Toast ── */
.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--surface3);border:1px solid var(--border);
  padding:14px 24px;border-radius:var(--radius-sm);
  font-size:.88rem;color:var(--text);z-index:2000;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  transition:transform .35s cubic-bezier(.175,.885,.32,1.275);
  pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── Responsive ── */
@media(max-width:600px){
  .app{padding:16px 12px 40px}
  .app-header h1{font-size:1.8rem}
  .card{padding:20px 16px}
  .slot-name{font-size:1.8rem}
  .winners-grid{grid-template-columns:1fr}
  .stats-bar{flex-direction:column}
}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="app-header">
    <h1>🎰 會員抽獎程式</h1>
    <p>上傳會員 CSV → 自動篩選資格 → 設定獎品 → 公平抽獎</p>
  </header>

  <!-- Step 1: Upload CSV -->
  <div class="card" id="step1">
    <div class="card-title"><span class="step">1</span> 上傳會員資料</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="csvInput" accept=".csv">
      <span class="icon">📁</span>
      <div class="main-text">點擊或拖曳上傳 CSV 檔案</div>
      <div class="sub-text">支援 .csv 格式，需包含 Email、Name、Type 欄位</div>
    </div>
    <div id="fileInfo" class="hidden mt-12 text-muted text-center"></div>
    <div id="statsBar" class="stats-bar hidden"></div>
  </div>

  <!-- Step 2: Eligible Members -->
  <div class="card hidden" id="step2">
    <div class="card-title"><span class="step">2</span> 符合抽獎資格的會員</div>
    <p class="text-muted mb-12">已自動排除 Type 為 Free 及 Author 的會員，以下為有抽獎資格的名單</p>
    <div style="max-height:360px;overflow-y:auto">
      <table class="members-table">
        <thead><tr><th>#</th><th>名稱</th><th>Email</th><th>Type</th></tr></thead>
        <tbody id="membersBody"></tbody>
      </table>
    </div>
    <div id="truncateNote" class="hidden text-muted text-center mt-12"></div>
  </div>

  <!-- Step 3: Prize Config -->
  <div class="card hidden" id="step3">
    <div class="card-title"><span class="step">3</span> 設定獎品</div>
    <div id="prizeList">
      <div class="prize-row">
        <input type="text" class="prize-name" placeholder="獎品名稱，例如：頭獎 iPhone 16">
        <input type="number" class="prize-qty qty" placeholder="份數" min="1" value="1">
        <button class="remove-prize" onclick="removePrize(this)" title="移除">✕</button>
      </div>
    </div>
    <button class="btn btn-outline btn-sm mt-12" onclick="addPrize()">＋ 新增獎品</button>
    <div class="divider"></div>
    <div class="row">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="noDuplicate" checked style="width:auto;accent-color:var(--accent)">
        排除重複中獎（同一人只能得一個獎）
      </label>
    </div>
    <button class="btn btn-gold btn-block mt-20" onclick="startLottery()" id="startBtn">
      🎰 開始抽獎！
    </button>
  </div>

  <!-- Step 4: Results -->
  <div class="card hidden" id="step4">
    <div class="card-title"><span class="step">🏆</span> 中獎名單</div>
    <div id="winnersGrid" class="winners-grid"></div>
    <div class="divider"></div>
    <div class="flex-between">
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">📥 匯出中獎名單 CSV</button>
      <button class="btn btn-primary btn-sm" onclick="resetLottery()">🔄 重新抽獎</button>
    </div>
  </div>
</div>

<!-- Lottery Animation -->
<div class="lottery-overlay" id="lotteryOverlay">
  <div class="slot-machine">
    <div class="prize-label" id="currentPrizeLabel"></div>
    <div class="slot-name" id="slotName">準備中...</div>
    <div class="slot-email" id="slotEmail"></div>
    <button class="btn btn-gold mt-24 hidden" id="nextDrawBtn" onclick="drawNext()">抽出下一位 →</button>
  </div>
</div>
<div class="confetti-container" id="confetti"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── State ───
let allMembers = [];
let eligibleMembers = [];
let winners = [];
let prizeQueue = [];
let drawnIndices = new Set();

// ─── Toast ───
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── CSV Parser (handles quoted fields with commas) ───
function parseCSV(text) {
  const lines = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && i + 1 < text.length && text[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (current.length > 0) {
        lines.push(current);
        current = '';
      }
      if (ch === '\r' && i + 1 < text.length && text[i + 1] === '\n') i++;
    } else {
      current += ch;
    }
  }
  if (current.length > 0) lines.push(current);

  if (lines.length === 0) return [];

  function splitRow(line) {
    const fields = [];
    let field = '';
    let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && i + 1 < line.length && line[i + 1] === '"') {
          field += '"'; i++;
        } else {
          inQ = !inQ;
        }
      } else if (ch === ',' && !inQ) {
        fields.push(field.trim());
        field = '';
      } else {
        field += ch;
      }
    }
    fields.push(field.trim());
    return fields;
  }

  // Remove BOM
  let headerLine = lines[0];
  if (headerLine.charCodeAt(0) === 0xFEFF) headerLine = headerLine.slice(1);
  const headers = splitRow(headerLine);

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const fields = splitRow(lines[i]);
    if (fields.length === 0) continue;
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = fields[idx] || ''; });
    rows.push(obj);
  }
  return rows;
}

// ─── Step 1: Upload & Parse CSV ───
const csvInput = document.getElementById('csvInput');
const uploadZone = document.getElementById('uploadZone');

uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => { uploadZone.classList.remove('dragover'); });
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) {
    csvInput.files = e.dataTransfer.files;
    handleFile(e.dataTransfer.files[0]);
  }
});
csvInput.addEventListener('change', (e) => {
  if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.csv')) {
    toast('請上傳 .csv 檔案');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    allMembers = parseCSV(text);

    if (allMembers.length === 0) {
      toast('CSV 檔案沒有資料');
      return;
    }

    // Check required columns
    const sample = allMembers[0];
    const hasEmail = 'Email' in sample || 'email' in sample;
    const hasName = 'Name' in sample || 'name' in sample;
    const hasType = 'Type' in sample || 'type' in sample;

    if (!hasEmail || !hasName || !hasType) {
      toast('CSV 缺少必要欄位（Email, Name, Type）');
      return;
    }

    // Normalize keys
    const emailKey = 'Email' in sample ? 'Email' : 'email';
    const nameKey = 'Name' in sample ? 'Name' : 'name';
    const typeKey = 'Type' in sample ? 'Type' : 'type';

    allMembers = allMembers.map(m => ({
      email: (m[emailKey] || '').trim(),
      name: (m[nameKey] || '').trim(),
      type: (m[typeKey] || '').trim(),
    })).filter(m => m.email && m.name);

    // Filter: exclude Type=Free and Type=Author
    const excludeTypes = ['free', 'author'];
    const excludedCount = allMembers.filter(m => excludeTypes.includes(m.type.toLowerCase())).length;
    eligibleMembers = allMembers.filter(m => !excludeTypes.includes(m.type.toLowerCase()));

    // Update UI
    uploadZone.classList.add('has-file');
    document.getElementById('fileInfo').classList.remove('hidden');
    document.getElementById('fileInfo').textContent = `📄 ${file.name}（已載入會員資料）`;

    // Stats
    const statsBar = document.getElementById('statsBar');
    statsBar.classList.remove('hidden');

    // Count by type
    const typeCounts = {};
    allMembers.forEach(m => {
      const t = m.type || '(空)';
      typeCounts[t] = (typeCounts[t] || 0) + 1;
    });

    statsBar.innerHTML = `
      <div class="stat-item">
        <div class="stat-value text-accent">***</div>
        <div class="stat-label">全部會員</div>
      </div>
      <div class="stat-item">
        <div class="stat-value text-success">***</div>
        <div class="stat-label">有抽獎資格</div>
      </div>
      <div class="stat-item">
        <div class="stat-value text-danger">${excludedCount}</div>
        <div class="stat-label">Free / Author（不符資格）</div>
      </div>
    `;

    renderMembers();
    show('step2');
    show('step3');
    toast(`已載入符合資格的會員，準備抽獎！`);
  };
  reader.readAsText(file, 'UTF-8');
}

function getTypeClass(type) {
  const t = type.toLowerCase();
  if (t.includes('comp')) return 'comp';
  if (t.includes('yearly')) return 'yearly';
  if (t.includes('monthly')) return 'monthly';
  if (t.includes('gift')) return 'gift';
  return 'other';
}

function renderMembers() {
  const tbody = document.getElementById('membersBody');
  const displayList = eligibleMembers.slice(0, 100);
  tbody.innerHTML = displayList.map((m, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${esc(m.name)}</td>
      <td style="color:var(--text3);font-size:.82rem">${esc(maskEmail(m.email))}</td>
      <td><span class="type-tag ${getTypeClass(m.type)}">${esc(m.type)}</span></td>
    </tr>
  `).join('');

  const note = document.getElementById('truncateNote');
  if (eligibleMembers.length > 100) {
    note.classList.remove('hidden');
    note.textContent = `僅顯示前 100 筆，共 *** 位符合資格`;
  } else {
    note.classList.add('hidden');
  }
}

// ─── Step 3: Prize Config ───
function addPrize() {
  const row = document.createElement('div');
  row.className = 'prize-row';
  row.innerHTML = `
    <input type="text" class="prize-name" placeholder="獎品名稱">
    <input type="number" class="prize-qty qty" placeholder="份數" min="1" value="1">
    <button class="remove-prize" onclick="removePrize(this)" title="移除">✕</button>
  `;
  document.getElementById('prizeList').appendChild(row);
}

function removePrize(btn) {
  const list = document.getElementById('prizeList');
  if (list.children.length <= 1) { toast('至少需要一個獎品'); return; }
  btn.closest('.prize-row').remove();
}

// ─── Lottery ───
function startLottery() {
  prizeQueue = [];
  const rows = document.querySelectorAll('.prize-row');
  rows.forEach(row => {
    const name = row.querySelector('.prize-name').value.trim() || '獎品';
    const qty = parseInt(row.querySelector('.prize-qty').value) || 1;
    for (let i = 0; i < qty; i++) {
      prizeQueue.push(name);
    }
  });

  const total = prizeQueue.length;
  if (total === 0) { toast('請設定獎品'); return; }
  if (eligibleMembers.length === 0) { toast('沒有可抽獎的會員'); return; }
  if (eligibleMembers.length < total) {
    toast(`會員數 (${eligibleMembers.length}) 少於獎品數 (${total})`);
    return;
  }

  winners = [];
  drawnIndices = new Set();
  document.getElementById('lotteryOverlay').classList.add('show');
  drawNext();
}

function drawNext() {
  if (prizeQueue.length === 0) {
    document.getElementById('lotteryOverlay').classList.remove('show');
    renderWinners();
    show('step4');
    toast('抽獎完成！🎉');
    return;
  }

  const prize = prizeQueue.shift();
  const noDup = document.getElementById('noDuplicate').checked;

  let candidateIndices = [];
  for (let i = 0; i < eligibleMembers.length; i++) {
    if (noDup && drawnIndices.has(i)) continue;
    candidateIndices.push(i);
  }

  if (candidateIndices.length === 0) {
    toast('沒有更多候選人可抽取');
    document.getElementById('lotteryOverlay').classList.remove('show');
    if (winners.length > 0) { renderWinners(); show('step4'); }
    return;
  }

  document.getElementById('currentPrizeLabel').textContent = `🎁 ${prize}`;
  const nameEl = document.getElementById('slotName');
  const emailEl = document.getElementById('slotEmail');
  const nextBtn = document.getElementById('nextDrawBtn');
  nextBtn.classList.add('hidden');
  nameEl.classList.add('rolling');
  emailEl.textContent = '';

  let rollCount = 0;
  const rollInterval = setInterval(() => {
    const randIdx = candidateIndices[Math.floor(Math.random() * candidateIndices.length)];
    const rand = eligibleMembers[randIdx];
    nameEl.textContent = rand.name;
    rollCount++;
    if (rollCount >= 30) {
      clearInterval(rollInterval);
      const winnerIdx = candidateIndices[Math.floor(Math.random() * candidateIndices.length)];
      const winner = eligibleMembers[winnerIdx];
      nameEl.classList.remove('rolling');
      nameEl.textContent = winner.name;
      emailEl.textContent = maskEmail(winner.email);

      drawnIndices.add(winnerIdx);
      winners.push({ name: winner.name, email: winner.email, type: winner.type, prize });

      launchConfetti();

      setTimeout(() => {
        if (prizeQueue.length > 0) {
          nextBtn.textContent = `抽出下一位 → (剩餘 ${prizeQueue.length} 份)`;
        } else {
          nextBtn.textContent = '✅ 查看完整名單';
        }
        nextBtn.classList.remove('hidden');
      }, 1200);
    }
  }, 60);
}

function renderWinners() {
  const grid = document.getElementById('winnersGrid');
  grid.innerHTML = winners.map((w, i) => `
    <div class="winner-card" style="animation-delay:${i * 0.1}s">
      <div class="winner-avatar">${esc(w.name.charAt(0))}</div>
      <div class="winner-info">
        <div class="winner-name">${esc(w.name)}</div>
        <div class="winner-email">${esc(maskEmail(w.email))}</div>
        <div class="winner-prize">🎁 ${esc(w.prize)}</div>
      </div>
    </div>
  `).join('');
}

function exportCSV() {
  if (winners.length === 0) { toast('沒有中獎名單'); return; }
  const BOM = '\uFEFF';
  let csv = BOM + '序號,Name,Email,Type,獎品\n';
  winners.forEach((w, i) => {
    csv += `${i+1},"${w.name}","${w.email}","${w.type}","${w.prize}"\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `中獎名單_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV 已下載');
}

function resetLottery() {
  document.getElementById('step4').classList.add('hidden');
  document.getElementById('step3').classList.remove('hidden');
  winners = [];
  drawnIndices = new Set();
}

// ─── Confetti ───
function launchConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#ffd700','#ff6b6b','#6c5ce7','#a29bfe','#fd79a8','#00b894','#ff9f43'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = Math.random() * 100;
    const delay = Math.random() * 0.5;
    const size = 6 + Math.random() * 6;
    c.style.cssText = `
      position:absolute;left:${left}%;top:-10px;
      width:${size}px;height:${size * 1.4}px;
      background:${color};border-radius:2px;
      animation:confettiFall ${1.8 + Math.random()}s ease-in ${delay}s forwards;
      transform:rotate(${Math.random()*360}deg);
    `;
    container.appendChild(c);
  }
  setTimeout(() => { container.innerHTML = ''; }, 3000);
}

// Inject confetti keyframes
const style = document.createElement('style');
style.textContent = `
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}`;
document.head.appendChild(style);

// ─── Helpers ───
function show(id) {
  document.getElementById(id).classList.remove('hidden');
  setTimeout(() => {
    document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function maskEmail(email) {
  if (!email) return '';
  const at = email.indexOf('@');
  if (at < 0) return email;
  const user = email.substring(0, at);
  // Keep first 3 chars of username (or fewer if short), mask the rest
  const show = Math.min(3, user.length);
  const masked = user.substring(0, show) + '***';
  return masked + '@***.***';
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}
</script>
